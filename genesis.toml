schema_version = 1
package = "enoch"

# Only these Git-tracked paths form the inheritable software body. Runtime
# state, credentials, memories, logs, and worktree-local instance data remain
# outside the descent boundary.
body_paths = [
  ".gitignore",
  "LICENSE",
  "bin",
  "pyproject.toml",
  "src/enoch",
  "tests",
]

# Genesis prepends the active Python interpreter and runs this inherited gate
# before either birth-related commit is accepted.
validation = ["-m", "unittest", "discover", "-s", "tests"]

[[runtime_dependencies]]
name = "provider-kit"
requirement = "our-ark-provider-kit @ git+https://github.com/our-ark/enoch.git@6a1952a069be703ba0b55205857acd28db10345f#subdirectory=libraries/provider-kit"
import_name = "our_ark_provider_kit"
local_source = "libraries/provider-kit/src"

[[runtime_dependencies]]
name = "telegram"
requirement = "our-ark-telegram @ git+https://github.com/our-ark/enoch.git@c5a6de8100f4359cd0266238ebc28fcbd2dc65bb#subdirectory=libraries/telegram"
import_name = "our_ark_telegram"
local_source = "libraries/telegram/src"
optional = true

[[runtime_dependencies]]
name = "github"
requirement = "our-ark-github @ git+https://github.com/our-ark/enoch.git@c5a6de8100f4359cd0266238ebc28fcbd2dc65bb#subdirectory=libraries/github"
import_name = "our_ark_github"
local_source = "libraries/github/src"
optional = true

[[runtime_dependencies]]
name = "launchd"
requirement = "our-ark-launchd @ git+https://github.com/our-ark/enoch.git@c5a6de8100f4359cd0266238ebc28fcbd2dc65bb#subdirectory=libraries/launchd"
import_name = "our_ark_launchd"
local_source = "libraries/launchd/src"
optional = true

[[runtime_dependencies]]
name = "systemd"
requirement = "our-ark-systemd @ git+https://github.com/our-ark/enoch.git@c5a6de8100f4359cd0266238ebc28fcbd2dc65bb#subdirectory=libraries/systemd"
import_name = "our_ark_systemd"
local_source = "libraries/systemd/src"
optional = true

[[runtime_dependencies]]
name = "skill-catalog"
requirement = "our-ark-skill-catalog @ git+https://github.com/our-ark/enoch.git@946ff26f93bff3f6eefeb5deb81ca4db1127266f#subdirectory=libraries/skill-catalog"
import_name = "our_ark_skill_catalog"
local_source = "libraries/skill-catalog/src"

[[runtime_dependencies]]
name = "telegram-vision"
requirement = "our-ark-telegram-vision @ git+https://github.com/our-ark/enoch.git@6d894d9beb882af7e5f57900b2323361510262de#subdirectory=libraries/telegram-vision"
import_name = "our_ark_telegram_vision"
local_source = "libraries/telegram-vision/src"
optional = true
