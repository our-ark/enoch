name: telegram-talk
version: 0.1.0
summary: Talk with Enoch through Telegram, including conversation, repository work, ancestor commands, and approved GitHub workflows after chat lock.
owner: Enoch
status: active
mode: external-tool
entrypoint: src/enoch/telegram/bot.py
permissions:
  files:
    read: true
    write: approved_actions
  network:
    telegram: true
  git:
    commit: approved_action
    push: approved_action
validation:
  command: python3 -m unittest discover -s tests
