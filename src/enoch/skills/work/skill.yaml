name: work
version: 0.2.0
summary: Run leased persistent work in isolated task worktrees through queues, backlog, cron, and automatic learning.
owner: Enoch
status: active
mode: background-work
entrypoint: src/enoch/app/core.py
capabilities:
  task_queue: src/enoch/tasks/queue.py
  task_failure_classification: src/enoch/tasks/failures.py
  task_worktrees: src/enoch/tasks/worktree.py
  backlog: src/enoch/backlog.py
  cron: src/enoch/cron.py
  automatic_learning: src/enoch/automatic_learning.py
permissions:
  filesystem:
    read: true
    write:
      - .enoch/task_queue.json
      - .enoch/backlog.json
      - .enoch/cron.json
      - .enoch/learning
  chat:
    send_status_updates: true
validation:
  command: python3 -m unittest discover -s tests
