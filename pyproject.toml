[project]
name = "enoch"
version = "0.1.0"
description = "Enoch is a Genesis-created local agent."
readme = "README.md"
license = "Apache-2.0"
license-files = ["LICENSE"]
requires-python = ">=3.11"
dependencies = [
  "our-ark-provider-kit @ git+https://github.com/our-ark/enoch.git@5608b4b1ce85f64c3093730fcaac9c3a458169ca#subdirectory=libraries/provider-kit",
  "our-ark-telegram @ git+https://github.com/our-ark/enoch.git@5608b4b1ce85f64c3093730fcaac9c3a458169ca#subdirectory=libraries/telegram",
  "our-ark-skill-catalog @ git+https://github.com/our-ark/enoch.git@946ff26f93bff3f6eefeb5deb81ca4db1127266f#subdirectory=libraries/skill-catalog",
  "our-ark-telegram-vision @ git+https://github.com/our-ark/enoch.git@6d894d9beb882af7e5f57900b2323361510262de#subdirectory=libraries/telegram-vision",
]

[project.scripts]
enoch = "enoch.cli:main"
enoch-agent = "enoch.application:main"
enoch-daemon = "enoch.daemon:main"
enoch-telegram = "enoch.telegram:telegram_main"

[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
enoch = ["identity.yaml"]
