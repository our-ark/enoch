[project]
name = "enoch"
version = "0.1.0"
description = "Enoch is a Genesis-created local agent."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
enoch = "enoch.cli:main"
enoch-daemon = "enoch.daemon:main"
enoch-telegram = "enoch.telegram:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
enoch = ["identity.yaml"]
